name: Arbitrage Bot

on:
  schedule:
    - cron: "0 * * * *"   # main scan — top of every hour
    - cron: "30 * * * *"  # delayed free alerts — 30 min after each scan
  workflow_dispatch:

jobs:
  run-arbitrage:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 '))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run arbitrage bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_BIG_ARB_CHANNEL_ID: ${{ secrets.DISCORD_BIG_ARB_CHANNEL_ID }}
          DISCORD_FREE_CHANNEL_ID: ${{ secrets.DISCORD_FREE_CHANNEL_ID }}
          DISCORD_INVITE_LINK: ${{ secrets.DISCORD_INVITE_LINK }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          USE_SCRAPER: "1"
        run: |
          python arb_finder.py

      - name: Commit pending free alerts
        run: |
          git config user.name "arb-bot"
          git config user.email "bot@users.noreply.github.com"
          git add pending_free_alerts.json || true
          git diff --cached --quiet || git commit -m "queue free alerts"
          git push

  post-free-alerts:
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '30 ')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Post delayed free alerts
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_FREE_CHANNEL_ID: ${{ secrets.DISCORD_FREE_CHANNEL_ID }}
        run: |
          python post_free_alerts.py

      - name: Clear pending alerts
        run: |
          git config user.name "arb-bot"
          git config user.email "bot@users.noreply.github.com"
          git add pending_free_alerts.json || true
          git diff --cached --quiet || git commit -m "clear free alerts queue"
          git push
